<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Platanus Hack 26: Arcade Challenge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            oxanium: ['Oxanium', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
  </style>
</head>
<body class="bg-black text-white m-0 p-0">
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const LOCAL_STARTER_ORIGIN = 'http://localhost:3001';
    const LOCAL_DATA_REFRESH_MS = 2000;
    const CHALLENGE_INFO_REFRESH_MS = 60 * 60 * 1000;
    const CHALLENGE_INFO_STORAGE_KEY = 'platanus-arcade-challenge-info-cache';
    const CONTROLS_VISIBILITY_STORAGE_KEY = 'platanus-arcade-controls-visible';
    const IFRAME_KEY_STATE_MESSAGE = 'starter-key-state';
    const HACK_PRIMARY_CHANNELS = '225, 255, 0';
    const HACK_PRIMARY_RGB = `rgb(${HACK_PRIMARY_CHANNELS})`;
    const withHackPrimaryAlpha = (alpha) =>
      `rgba(${HACK_PRIMARY_CHANNELS}, ${alpha})`;
    const HACK_PRIMARY_BORDER = withHackPrimaryAlpha(0.34);
    const HACK_PRIMARY_BG = withHackPrimaryAlpha(0.1);
    const HACK_PRIMARY_BG_ACTIVE = withHackPrimaryAlpha(0.16);
    const HACK_PRIMARY_TEXT = withHackPrimaryAlpha(0.92);
    const HACK_PRIMARY_TEXT_DIM = withHackPrimaryAlpha(0.74);
    const HACK_PRIMARY_SHADOW = `0 0 18px ${withHackPrimaryAlpha(0.18)}`;
    const HACK_PRIMARY_PANEL = withHackPrimaryAlpha(0.08);
    const JOYSTICK_POSITIONS = [
      { id: 'up', label: 'U', key: 'up', className: 'col-start-2 row-start-1' },
      { id: 'left', label: 'L', key: 'left', className: 'col-start-1 row-start-2' },
      { id: 'right', label: 'R', key: 'right', className: 'col-start-3 row-start-2' },
      { id: 'down', label: 'D', key: 'down', className: 'col-start-2 row-start-3' },
    ];
    const CONTROLLERS = [
      {
        id: 'p1',
        title: 'P1',
        directionKeys: {
          up: 'w',
          left: 'a',
          right: 'd',
          down: 's',
        },
        buttons: [
          { id: 'p1-b1', label: 'B1', key: 'u' },
          { id: 'p1-b2', label: 'B2', key: 'i' },
          { id: 'p1-b3', label: 'B3', key: 'o' },
          { id: 'p1-b4', label: 'B4', key: 'j' },
          { id: 'p1-b5', label: 'B5', key: 'k' },
          { id: 'p1-b6', label: 'B6', key: 'l' },
        ],
        systemButtons: [
          { id: 'p1-start', label: 'Start', key: 'Enter' },
          { id: 'p1-coin', label: 'Coin', key: '1' },
        ],
      },
      {
        id: 'p2',
        title: 'P2',
        directionKeys: {
          up: 'ArrowUp',
          left: 'ArrowLeft',
          right: 'ArrowRight',
          down: 'ArrowDown',
        },
        buttons: [
          { id: 'p2-b1', label: 'B1', key: 'r' },
          { id: 'p2-b2', label: 'B2', key: 't' },
          { id: 'p2-b3', label: 'B3', key: 'y' },
          { id: 'p2-b4', label: 'B4', key: 'f' },
          { id: 'p2-b5', label: 'B5', key: 'g' },
          { id: 'p2-b6', label: 'B6', key: 'h' },
        ],
        systemButtons: [
          { id: 'p2-start', label: 'Start', key: '2' },
          { id: 'p2-coin', label: 'Coin', key: '3' },
        ],
      },
    ];

    function getStarterOrigin() {
      const { hostname, protocol } = window.location;
      const isLocalHttp =
        (hostname === 'localhost' || hostname === '127.0.0.1') &&
        protocol === 'http:';

      return isLocalHttp ? LOCAL_STARTER_ORIGIN : window.location.origin;
    }

    function getStarterUrl(path) {
      return new URL(path, getStarterOrigin()).toString();
    }

    function formatControlKey(key) {
      const keyLabels = {
        ArrowUp: 'Up',
        ArrowDown: 'Down',
        ArrowLeft: 'Left',
        ArrowRight: 'Right',
        Enter: 'Enter',
      };

      return keyLabels[key] || key.toUpperCase();
    }

    function readCachedChallengeInfo() {
      try {
        const raw = window.localStorage.getItem(CHALLENGE_INFO_STORAGE_KEY);
        if (!raw) {
          return null;
        }

        const parsed = JSON.parse(raw);
        if (
          !parsed ||
          typeof parsed !== 'object' ||
          typeof parsed.cachedAt !== 'number' ||
          !parsed.data
        ) {
          return null;
        }

        return parsed;
      } catch {
        return null;
      }
    }

    function readStoredControlsVisibility() {
      try {
        const raw = window.localStorage.getItem(CONTROLS_VISIBILITY_STORAGE_KEY);
        if (raw === null) {
          return true;
        }

        return raw === 'true';
      } catch {
        return true;
      }
    }

    function writeStoredControlsVisibility(isVisible) {
      try {
        window.localStorage.setItem(
          CONTROLS_VISIBILITY_STORAGE_KEY,
          String(isVisible),
        );
      } catch {
        // Ignore localStorage failures and keep in-memory state only.
      }
    }

    function writeCachedChallengeInfo(data) {
      try {
        window.localStorage.setItem(
          CHALLENGE_INFO_STORAGE_KEY,
          JSON.stringify({
            cachedAt: Date.now(),
            data,
          }),
        );
      } catch {
        // Ignore localStorage failures and continue with in-memory state only.
      }
    }

    function dispatchGameKeyState(key, pressed) {
      const iframe = document.getElementById('game-frame');
      const iframeWindow = iframe?.contentWindow;
      const iframeDocument = iframeWindow?.document;

      if (!iframeWindow || !iframeDocument) {
        return;
      }

      const eventType = pressed ? 'keydown' : 'keyup';
      const eventInit = {
        key,
        bubbles: true,
        cancelable: true,
      };

      const keyboardEvent = new iframeWindow.KeyboardEvent(eventType, eventInit);
      iframeWindow.dispatchEvent(keyboardEvent);
      iframeDocument.dispatchEvent(
        new iframeWindow.KeyboardEvent(eventType, eventInit),
      );
    }

    const RELEASE_STEP_LABELS = {
      idle: 'Ready',
      validating: 'Validating local setup',
      git_add: 'Staging files',
      git_commit: 'Creating release commit',
      resolve_commit: 'Resolving commit SHA',
      git_tag: 'Creating git tag',
      git_push: 'Pushing branch and tag',
      backend_request: 'Calling arcade release API',
      backend_response: 'Processing backend response',
      success: 'Release ingested',
      failed: 'Submission failed',
    };

    function formatDeadline(value) {
      if (!value) {
        return 'Unavailable';
      }

      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return 'Unavailable';
      }

      return date.toLocaleString('en-US', {
        month: 'short',
        day: 'numeric',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
        hour12: false,
        timeZoneName: 'short',
      });
    }

    // Submission Modal Component
    function SubmissionModal({
      isOpen,
      onClose,
      checks,
      gitInfo,
      coverCheck,
      challengeInfo,
    }) {
      const [submissionState, setSubmissionState] = useState({
        status: 'idle',
        isRunning: false,
        error: null,
        result: null,
      });

      useEffect(() => {
        if (!isOpen) {
          setSubmissionState({
            status: 'idle',
            isRunning: false,
            error: null,
            result: null,
          });
        }
      }, [isOpen]);

      if (!isOpen) return null;

      const canStart =
        checks?.passed &&
        gitInfo?.isGitRepo &&
        coverCheck?.isValid;

      const steps = [
        {
          key: 'git_add',
          title: 'Stage files',
          description: 'Adds the current game files to git.',
        },
        {
          key: 'git_commit',
          title: 'Create release commit',
          description: 'Creates a dedicated release commit, even if it is empty.',
        },
        {
          key: 'git_tag',
          title: 'Tag the release',
          description: 'Creates a unique arcade release tag from the new commit.',
        },
        {
          key: 'git_push',
          title: 'Push to GitHub',
          description: 'Pushes the branch and the release tag to origin.',
        },
        {
          key: 'backend_request',
          title: 'Ingest in arcade backend',
          description: 'Calls the release ingestion API with the repo and tag.',
        },
      ];

      const currentStepIndex = steps.findIndex(
        (step) => step.key === submissionState.status,
      );
      const coverPreviewUrl = getStarterUrl('/cover.png');

      const handleSubmit = async () => {
        if (!canStart || submissionState.isRunning) {
          if (!canStart) {
            alert('Please make sure all checks pass, you have a valid custom 800x600 PNG cover that is 500 KB or less, and a valid Git repository configured.');
          }
          return;
        }

        setSubmissionState({
          status: 'git_add',
          isRunning: true,
          error: null,
          result: null,
        });

        try {
          const response = await fetch(getStarterUrl('/api/submit-release'), {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ eventSlug: '26-ar' }),
          });

          setSubmissionState((current) => ({
            ...current,
            status: 'backend_response',
          }));

          const result = await response.json();

          if (!response.ok || !result.success) {
            setSubmissionState({
              status: result.step || 'failed',
              isRunning: false,
              error: result.error || 'Submission failed.',
              result: null,
            });
            return;
          }

          setSubmissionState({
            status: 'success',
            isRunning: false,
            error: null,
            result,
          });
        } catch (error) {
          setSubmissionState({
            status: 'failed',
            isRunning: false,
            error: error instanceof Error ? error.message : 'Submission failed.',
            result: null,
          });
        }
      };

      return (
        <div 
          className="fixed inset-0 bg-black/85 backdrop-blur-sm z-50 flex items-center justify-center"
          onClick={(e) => {
            if (e.target === e.currentTarget && !submissionState.isRunning) {
              onClose();
            }
          }}
        >
          <div className="bg-[#111] border border-white/20 rounded-lg max-w-2xl w-[90%] max-h-[90vh] overflow-y-auto shadow-2xl">
            <div className="p-6 pb-4 border-b border-white/10">
              <h2 className="font-oxanium text-2xl mb-2">🚀 Submit Arcade Release</h2>
              <p className="text-sm text-gray-400">
                This will stage your files, create a release commit, push a git tag, and call the arcade ingestion backend.
              </p>
            </div>

            <div className="p-6 space-y-6">
              <div className="grid gap-4 rounded border border-white/10 bg-white/[0.03] p-4 md:grid-cols-[1fr_220px]">
                <div>
                  <div className="mb-3 text-xs uppercase tracking-wider text-gray-500">
                    Release Target
                  </div>
                  <div className="space-y-2 text-sm">
                    <div className="flex items-center justify-between gap-3">
                      <span className="text-gray-400">Challenge</span>
                      <span className="font-medium text-white text-right">
                        {challengeInfo?.challenge?.name || '/26 arcade releases'}
                      </span>
                    </div>
                    <div className="flex items-center justify-between gap-3">
                      <span className="text-gray-400">Repository</span>
                      <span className="font-medium text-white break-all text-right">
                        {gitInfo?.remoteUrl || 'No git remote detected'}
                      </span>
                    </div>
                    <div className="flex items-center justify-between gap-3">
                      <span className="text-gray-400">Branch</span>
                      <span className="font-medium text-white">
                        {gitInfo?.branch || 'Unknown'}
                      </span>
                    </div>
                    <div className="flex items-center justify-between gap-3">
                      <span className="text-gray-400">Submission Deadline</span>
                      <span className="font-medium text-white text-right">
                        {formatDeadline(challengeInfo?.challenge?.submissionDeadline)}
                      </span>
                    </div>
                  </div>
                </div>
                <div>
                  <div className="mb-2 text-xs uppercase tracking-wider text-gray-500">
                    Cover Preview
                  </div>
                  <div className="overflow-hidden rounded border border-white/10 bg-black/20">
                    <img
                      src={coverPreviewUrl}
                      alt="Current game cover"
                      className="block h-auto w-full"
                    />
                  </div>
                </div>
              </div>

              <div>
                <h3 className="text-sm font-semibold uppercase tracking-wider text-white mb-3">Checks</h3>
                <div className="space-y-2">
                  <div className="flex items-center bg-white/[0.03] rounded p-2 text-sm">
                    <span className="text-base mr-2">{coverCheck?.isValid ? '✅' : '❌'}</span>
                    <span className="flex-1 text-gray-300">Custom Cover (800x600, ≤500 KB)</span>
                    <span className="font-medium">{coverCheck?.isValid ? 'Valid' : 'Invalid'}</span>
                  </div>
                  <div className="flex items-center bg-white/[0.03] rounded p-2 text-sm">
                    <span className="text-base mr-2">{checks?.sizeKB <= 50 ? '✅' : '❌'}</span>
                    <span className="flex-1 text-gray-300">File Size</span>
                    <span className="font-medium">{checks?.sizeKB?.toFixed(2)} KB / 50 KB</span>
                  </div>
                  <div className="flex items-center bg-white/[0.03] rounded p-2 text-sm">
                    <span className="text-base mr-2">{gitInfo?.isGitRepo ? '✅' : '❌'}</span>
                    <span className="flex-1 text-gray-300">Git Repository</span>
                    <span className="font-medium">{gitInfo?.isGitRepo ? 'Ready' : 'Missing'}</span>
                  </div>
                </div>
              </div>

              <div>
                <h3 className="text-sm font-semibold uppercase tracking-wider text-white mb-3">Submission Steps</h3>
                <div className="space-y-2">
                  {steps.map((step, index) => {
                    const isDone =
                      submissionState.status === 'success' ||
                      (currentStepIndex !== -1 && index < currentStepIndex);
                    const isActive =
                      submissionState.isRunning &&
                      (submissionState.status === step.key ||
                        (submissionState.status === 'backend_response' &&
                          step.key === 'backend_request'));

                    return (
                      <div
                        key={step.key}
                        className={`rounded border p-3 text-sm ${
                          isActive
                            ? ''
                            : isDone
                              ? ''
                              : 'border-white/10 bg-white/[0.03]'
                        }`}
                        style={
                          isActive || isDone
                            ? {
                                borderColor: HACK_PRIMARY_BORDER,
                                backgroundColor: HACK_PRIMARY_BG,
                              }
                            : undefined
                        }
                      >
                        <div className="flex items-center gap-2">
                          <span>
                            {isDone ? '✅' : isActive ? '⏳' : '•'}
                          </span>
                          <span className="font-medium text-white">{step.title}</span>
                        </div>
                        <div className="mt-1 ml-6 text-xs text-gray-400">
                          {step.description}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              <div className="rounded border border-white/10 bg-white/[0.03] p-4">
                <div className="text-xs uppercase tracking-wider text-gray-500 mb-2">
                  Status
                </div>
                <div className="text-sm text-white">
                  {RELEASE_STEP_LABELS[submissionState.status] || 'Ready'}
                </div>
                {submissionState.error && (
                  <div className="mt-3 rounded border border-red-500/30 bg-red-500/10 p-3 text-sm text-red-300">
                    {submissionState.error}
                  </div>
                )}
                {submissionState.result && (
                  <div
                    className="mt-3 rounded border p-3 text-sm"
                    style={{
                      borderColor: HACK_PRIMARY_BORDER,
                      backgroundColor: HACK_PRIMARY_BG,
                      color: HACK_PRIMARY_TEXT,
                    }}
                  >
                    <div>Release submitted successfully.</div>
                    <div className="mt-2 space-y-1 text-xs text-white/80">
                      <div>Tag: <code>{submissionState.result.tag}</code></div>
                      <div>Commit: <code>{submissionState.result.commitSha.slice(0, 7)}</code></div>
                      <div>Version slug: <code>{submissionState.result.release.slug}</code></div>
                      <div>Version number: <code>v{submissionState.result.release.versionNumber}</code></div>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="p-4 pt-0 flex flex-col gap-3">
              <button
                onClick={handleSubmit}
                disabled={!canStart || submissionState.isRunning}
                className={`w-full py-3 border rounded transition-all uppercase tracking-wider text-sm font-medium ${
                  canStart && !submissionState.isRunning
                    ? ''
                    : 'bg-white/5 text-gray-500 border-white/15 cursor-not-allowed'
                }`}
                style={
                  canStart && !submissionState.isRunning
                    ? {
                        backgroundColor: HACK_PRIMARY_BG,
                        color: HACK_PRIMARY_TEXT,
                        borderColor: HACK_PRIMARY_BORDER,
                      }
                    : undefined
                }
              >
                {submissionState.isRunning ? 'Submitting Release...' : 'Submit Release'}
              </button>
              <button
                onClick={onClose}
                disabled={submissionState.isRunning}
                className="w-full py-3 bg-white/5 text-gray-400 border border-white/15 rounded hover:bg-white/[0.08] hover:border-white/25 transition-all uppercase tracking-wider text-sm font-medium disabled:cursor-not-allowed disabled:opacity-60"
              >
                Close
              </button>
            </div>
          </div>
        </div>
      );
    }

    function VirtualControllerPanel({
      controller,
      activeKeys,
      onPressControl,
      onReleaseControl,
    }) {
      const pressedKeySet = new Set(activeKeys);

      return (
        <div className="rounded-[1.25rem] border border-white/10 bg-[#090d1b] p-3">
          <div className="mb-3 text-center text-[11px] uppercase tracking-[0.28em] text-white/45">
            {controller.title} Controller
          </div>
          <div className="mx-auto grid h-32 w-32 grid-cols-3 grid-rows-3 gap-1.5 rounded-full border border-white/10 bg-white/[0.02] p-1.5 shadow-[inset_0_0_20px_rgba(255,255,255,0.03)]">
            {JOYSTICK_POSITIONS.map((position) => {
              const mappedKey = controller.directionKeys[position.key];
              const isPressed = pressedKeySet.has(mappedKey);

              return (
                <button
                  key={`${controller.id}-${position.id}`}
                  type="button"
                  onPointerDown={(event) => {
                    event.preventDefault();
                    onPressControl(`${controller.id}-${position.id}`, [mappedKey]);
                  }}
                  onPointerUp={() =>
                    onReleaseControl(`${controller.id}-${position.id}`)
                  }
                  onPointerLeave={() =>
                    onReleaseControl(`${controller.id}-${position.id}`)
                  }
                  onPointerCancel={() =>
                    onReleaseControl(`${controller.id}-${position.id}`)
                  }
                  className={`${position.className} flex flex-col items-center justify-center rounded-full border text-xs font-semibold transition-all ${
                    isPressed
                      ? 'text-white'
                      : 'border-white/10 bg-transparent text-white/65 hover:border-white/18 hover:bg-white/[0.04] hover:text-white/80'
                  }`}
                  style={
                    isPressed
                      ? {
                          borderColor: HACK_PRIMARY_BORDER,
                          backgroundColor: HACK_PRIMARY_BG_ACTIVE,
                          boxShadow: HACK_PRIMARY_SHADOW,
                        }
                      : undefined
                  }
                >
                  <span className="text-[10px] uppercase tracking-[0.16em] text-white/55">
                    {position.label}
                  </span>
                  <span
                    className="text-[11px] uppercase tracking-[0.18em]"
                    style={{
                      color: isPressed ? HACK_PRIMARY_RGB : HACK_PRIMARY_TEXT_DIM,
                    }}
                  >
                    {formatControlKey(mappedKey)}
                  </span>
                </button>
              );
            })}
          </div>

          <div className="mx-auto mt-3 grid max-w-[180px] grid-cols-3 gap-2">
            {controller.buttons.map((button) => {
              const isPressed = pressedKeySet.has(button.key);

              return (
                <button
                  key={button.id}
                  type="button"
                  onPointerDown={(event) => {
                    event.preventDefault();
                    onPressControl(button.id, [button.key]);
                  }}
                  onPointerUp={() => onReleaseControl(button.id)}
                  onPointerLeave={() => onReleaseControl(button.id)}
                  onPointerCancel={() => onReleaseControl(button.id)}
                  className={`aspect-square w-full rounded-full border transition-all ${
                    isPressed
                      ? 'text-white'
                      : 'border-white/[0.04] bg-white/[0.05] text-white/82 hover:border-white/10 hover:bg-white/[0.08] hover:text-white'
                  }`}
                  style={
                    isPressed
                      ? {
                          borderColor: HACK_PRIMARY_BORDER,
                          backgroundColor: HACK_PRIMARY_BG_ACTIVE,
                          boxShadow: HACK_PRIMARY_SHADOW,
                        }
                      : undefined
                  }
                >
                  <span className="flex h-full flex-col items-center justify-center gap-0.5">
                    <span className="text-[10px] font-semibold uppercase tracking-[0.14em] text-white/62">
                      {button.label}
                    </span>
                    <span
                      className="text-[12px] font-semibold uppercase tracking-[0.16em]"
                      style={{
                        color: isPressed ? HACK_PRIMARY_RGB : HACK_PRIMARY_TEXT,
                      }}
                    >
                      {formatControlKey(button.key)}
                    </span>
                  </span>
                </button>
              );
            })}
          </div>

          <div className="mx-auto mt-3 grid max-w-[180px] grid-cols-1 gap-2">
            {controller.systemButtons.map((button) => {
              const isPressed = pressedKeySet.has(button.key);

              return (
                <button
                  key={button.id}
                  type="button"
                  onPointerDown={(event) => {
                    event.preventDefault();
                    onPressControl(button.id, [button.key]);
                  }}
                  onPointerUp={() => onReleaseControl(button.id)}
                  onPointerLeave={() => onReleaseControl(button.id)}
                  onPointerCancel={() => onReleaseControl(button.id)}
                  className={`rounded-xl border px-3 py-2 transition-all ${
                    isPressed
                      ? 'text-white'
                      : 'border-white/[0.04] bg-white/[0.04] text-white/75 hover:border-white/10 hover:bg-white/[0.07] hover:text-white/90'
                  }`}
                  style={
                    isPressed
                      ? {
                          borderColor: HACK_PRIMARY_BORDER,
                          backgroundColor: HACK_PRIMARY_BG_ACTIVE,
                          boxShadow: HACK_PRIMARY_SHADOW,
                        }
                      : undefined
                  }
                >
                  <span className="flex items-center justify-between gap-3">
                    <span className="text-[10px] font-semibold uppercase tracking-[0.2em] text-white/62">
                      {button.label}
                    </span>
                    <span
                      className="rounded-full border px-2 py-1 text-[10px] font-semibold uppercase tracking-[0.14em]"
                      style={{
                        borderColor: HACK_PRIMARY_BORDER,
                        backgroundColor: isPressed
                          ? HACK_PRIMARY_BG_ACTIVE
                          : HACK_PRIMARY_BG,
                        color: isPressed ? HACK_PRIMARY_RGB : HACK_PRIMARY_TEXT,
                      }}
                    >
                      {formatControlKey(button.key)}
                    </span>
                  </span>
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    function VirtualGamepad({
      controllerIds,
      activeKeys,
      onPressControl,
      onReleaseControl,
    }) {
      const visibleControllers = CONTROLLERS.filter((controller) =>
        controllerIds.includes(controller.id),
      );

      return (
        <div
          className="w-[236px] shrink-0 rounded-[1.5rem] bg-white/[0.03] p-3 shadow-[0_18px_60px_rgba(0,0,0,0.35)] backdrop-blur"
        >
          <div className="flex flex-col gap-3">
            {visibleControllers.map((controller) => (
              <VirtualControllerPanel
                key={controller.id}
                controller={controller}
                activeKeys={activeKeys}
                onPressControl={onPressControl}
                onReleaseControl={onReleaseControl}
              />
            ))}
          </div>
        </div>
      );
    }

    // Main App Component
    function App() {
      const [metadata, setMetadata] = useState({ game_name: 'Loading...', description: 'Loading game information...' });
      const [checks, setChecks] = useState(null);
      const [gitInfo, setGitInfo] = useState(null);
      const [coverCheck, setCoverCheck] = useState(null);
      const [challengeInfo, setChallengeInfo] = useState(null);
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [timeRemaining, setTimeRemaining] = useState('');
      const [activeKeys, setActiveKeys] = useState([]);
      const [areControlsVisible, setAreControlsVisible] = useState(true);
      const pressedVirtualControlsRef = useRef(new Map());

      const loadLocalData = async () => {
        try {
          const [metadataRes, checksRes, gitRes, coverRes] = await Promise.all([
            fetch(getStarterUrl('/metadata.json')),
            fetch(getStarterUrl('/api/checks')),
            fetch(getStarterUrl('/api/git-info')),
            fetch(getStarterUrl('/api/cover-check')),
          ]);

          const metadataData = await metadataRes.json();
          const checksData = await checksRes.json();
          const gitData = await gitRes.json();
          const coverData = await coverRes.json();

          setMetadata(metadataData);
          setChecks(checksData);
          setGitInfo(gitData);
          setCoverCheck(coverData);
        } catch (error) {
          console.error('Failed to load local starter data:', error);
        }
      };

      const loadChallengeInfo = async () => {
        try {
          const response = await fetch(getStarterUrl('/api/challenge-info'));
          const challengeData = response.ok ? await response.json() : null;
          setChallengeInfo(challengeData);
          if (challengeData) {
            writeCachedChallengeInfo(challengeData);
          }
        } catch (error) {
          console.error('Failed to load challenge info:', error);
        }
      };

      useEffect(() => {
        setAreControlsVisible(readStoredControlsVisibility());

        const cachedChallengeInfo = readCachedChallengeInfo();
        if (cachedChallengeInfo?.data) {
          setChallengeInfo(cachedChallengeInfo.data);
        }

        loadLocalData();
        if (
          !cachedChallengeInfo ||
          Date.now() - cachedChallengeInfo.cachedAt >=
            CHALLENGE_INFO_REFRESH_MS
        ) {
          loadChallengeInfo();
        }

        const localDataInterval = setInterval(
          loadLocalData,
          LOCAL_DATA_REFRESH_MS,
        );
        const challengeInfoInterval = setInterval(
          loadChallengeInfo,
          CHALLENGE_INFO_REFRESH_MS,
        );

        return () => {
          clearInterval(localDataInterval);
          clearInterval(challengeInfoInterval);
        };
      }, []);

      useEffect(() => {
        writeStoredControlsVisibility(areControlsVisible);
      }, [areControlsVisible]);

      useEffect(() => {
        function syncActiveInput(key, pressed) {
          setActiveKeys((current) => {
            const next = new Set(current);
            if (pressed) {
              next.add(key);
            } else {
              next.delete(key);
            }

            return Array.from(next);
          });
        }

        function handleMessage(event) {
          if (
            event.data?.type !== IFRAME_KEY_STATE_MESSAGE ||
            typeof event.data?.key !== 'string' ||
            typeof event.data?.pressed !== 'boolean'
          ) {
            return;
          }

          syncActiveInput(event.data.key, event.data.pressed);
        }

        function releaseAllVirtualControls() {
          for (const [controlId, keys] of pressedVirtualControlsRef.current) {
            keys.forEach((key) => dispatchGameKeyState(key, false));
            pressedVirtualControlsRef.current.delete(controlId);
          }
        }

        window.addEventListener('message', handleMessage);
        window.addEventListener('pointerup', releaseAllVirtualControls);
        window.addEventListener('blur', releaseAllVirtualControls);

        return () => {
          window.removeEventListener('message', handleMessage);
          window.removeEventListener('pointerup', releaseAllVirtualControls);
          window.removeEventListener('blur', releaseAllVirtualControls);
        };
      }, []);

      const pressVirtualControl = (controlId, keys) => {
        if (pressedVirtualControlsRef.current.has(controlId)) {
          return;
        }

        pressedVirtualControlsRef.current.set(controlId, keys);
        keys.forEach((key) => dispatchGameKeyState(key, true));
      };

      const releaseVirtualControl = (controlId) => {
        const keys = pressedVirtualControlsRef.current.get(controlId);
        if (!keys) {
          return;
        }

        keys.forEach((key) => dispatchGameKeyState(key, false));
        pressedVirtualControlsRef.current.delete(controlId);
      };

      // Countdown timer for deadline
      useEffect(() => {
        const updateCountdown = () => {
          const deadlineValue = challengeInfo?.challenge?.submissionDeadline;
          if (!deadlineValue) {
            setTimeRemaining('DEADLINE UNAVAILABLE');
            return;
          }

          const deadline = new Date(deadlineValue);
          const now = new Date();
          const diff = deadline - now;

          if (diff <= 0) {
            setTimeRemaining('DEADLINE PASSED');
          } else {
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            if (days > 0) {
              setTimeRemaining(`${days}d ${hours}h ${minutes}m ${seconds}s`);
            } else if (hours > 0) {
              setTimeRemaining(`${hours}h ${minutes}m ${seconds}s`);
            } else {
              setTimeRemaining(`${minutes}m ${seconds}s`);
            }
          }
        };

        updateCountdown();
        const interval = setInterval(updateCountdown, 1000);
        return () => clearInterval(interval);
      }, [challengeInfo]);

      const isPlaceholder = metadata.game_name?.includes('<') || metadata.description?.includes('<');
      const isDeadlinePassed = challengeInfo?.windows?.submissionClosed === true;
      const canSubmit = !isPlaceholder && checks?.passed && coverCheck?.isValid && !isDeadlinePassed;
      const isTwoPlayer = metadata?.player_mode === 'two_player';
      const playerModeLabel = isTwoPlayer ? '2 Players' : '1 Player';

      const percentage = Math.min((checks?.sizeKB / 50) * 100 || 0, 100);
      const barColor =
        percentage < 80 ? HACK_PRIMARY_RGB : percentage < 95 ? '#f59e0b' : '#ef4444';
      return (
        <div className="flex w-full h-screen">
          {/* Sidebar */}
          <div className="w-[280px] shrink-0 bg-white/[0.02] border-r border-white/10 p-6 flex flex-col overflow-y-auto">
            <header className="mb-6">
              <h1 className="font-oxanium text-xl mb-1 font-semibold text-gray-400 tracking-wide">platanus hack 26</h1>
              <div className="text-[0.7rem] text-gray-600 uppercase tracking-widest">arcade challenge</div>
            </header>

            <div className={`mb-5 pb-5 border-b border-white/10 ${(isPlaceholder || !coverCheck?.isChanged) ? 'relative' : ''}`}>
              <h2 className={`text-base font-semibold mb-1.5 ${isPlaceholder ? 'text-orange-500' : 'text-white'}`}>
                {metadata.game_name}
              </h2>
              <div
                className="mb-2 inline-flex rounded-full border px-2.5 py-1 text-[0.65rem] font-medium uppercase tracking-[0.18em]"
                style={{
                  borderColor: 'rgba(255, 255, 255, 0.12)',
                  backgroundColor: 'rgba(255, 255, 255, 0.04)',
                  color: 'rgba(255, 255, 255, 0.62)',
                }}
              >
                {playerModeLabel}
              </div>
              <p className={`text-xs leading-relaxed ${isPlaceholder ? 'text-orange-500' : 'text-gray-400'}`}>
                {metadata.description}
              </p>
              {isPlaceholder && (
                <div className="mt-2 text-[0.7rem] text-orange-500 bg-orange-500/10 border border-orange-500/30 rounded px-2 py-1.5">
                  ⚠️ Update metadata.json
                </div>
              )}
              {coverCheck && !coverCheck.isValid && (
                <div className="mt-2 rounded border border-red-500/30 bg-red-500/10 px-2 py-1.5 text-[0.7rem] text-red-400">
                  ⚠️ {coverCheck.message}
                </div>
              )}
            </div>

            <div className="mb-4 rounded border border-white/10 bg-white/[0.03] p-3">
              <div className="mb-1.5 text-[0.68rem] uppercase tracking-wider text-gray-500">Minified File Size</div>
              <div className="mb-0.5 text-2xl font-semibold tabular-nums">{checks?.sizeKB?.toFixed(2) || '--'} KB</div>
              <div className="mb-2.5 text-[0.72rem] text-gray-500">original: {checks?.originalSizeKB?.toFixed(2) || '--'} KB</div>
              <div className="w-full h-2 bg-white/10 rounded overflow-hidden">
                <div
                  className="h-full transition-all duration-300"
                  style={{ width: `${percentage}%`, backgroundColor: barColor }}
                ></div>
              </div>
              <div className="mt-1 text-[0.68rem] text-right text-gray-500">of 50 KB</div>
            </div>

            <div className="flex-1">
              <h3 className="mb-2.5 text-[0.78rem] font-medium uppercase tracking-wider text-gray-500">checks</h3>
              <div className="space-y-1">
                {checks?.results?.filter(r => r.name !== 'Size Check').map((result, i) => (
                  <div key={i} className="flex flex-col px-2.5 py-1.5 text-sm">
                    <div className="mb-0.5 flex items-center">
                      <span className="mr-1.5 text-[0.85rem]">{result.passed ? '✅' : '❌'}</span>
                      <span className="text-[0.8rem] font-medium text-gray-300">{result.name}</span>
                    </div>
                    <div className="ml-6 text-[0.7rem] leading-snug text-gray-500">{result.message}</div>
                  </div>
                )) || <div className="text-sm italic text-gray-500">Checking restrictions...</div>}
              </div>
              <div
                className={`mt-3 rounded py-2 text-center text-[0.72rem] ${checks?.passed ? '' : 'border border-red-500/20 bg-red-500/10 text-red-400'}`}
                style={
                  checks?.passed
                    ? {
                        backgroundColor: HACK_PRIMARY_BG,
                        color: HACK_PRIMARY_TEXT,
                        border: `1px solid ${HACK_PRIMARY_BORDER}`,
                      }
                    : undefined
                }
              >
                {checks?.passed ? 'all checks passed' : 'some checks failed'}
              </div>
            </div>

            <div className="mt-6 pt-4 border-t border-white/10">
              {isDeadlinePassed ? (
                <div className="mb-4 p-3 bg-red-500/10 border border-red-500/30 rounded text-center">
                  <div className="text-red-400 text-sm font-medium mb-1">⏰ Submission Deadline Passed</div>
                  <div className="text-red-400/80 text-xs">Submissions closed on Nov 10, 2025 at 23:59 CLT</div>
                </div>
              ) : (
                <div
                  className="mb-4 rounded border p-3 text-center"
                  style={{
                    backgroundColor: HACK_PRIMARY_PANEL,
                    borderColor: HACK_PRIMARY_BORDER,
                  }}
                >
                  <div
                    className="mb-1 text-xs uppercase tracking-wider"
                    style={{ color: HACK_PRIMARY_TEXT_DIM }}
                  >
                    Time Remaining
                  </div>
                  <div
                    className="text-lg font-bold tabular-nums"
                    style={{ color: HACK_PRIMARY_TEXT }}
                  >
                    {timeRemaining || 'Loading...'}
                  </div>
                  {challengeInfo?.challenge?.submissionDeadline && (
                    <div className="mt-1 text-[0.7rem]" style={{ color: HACK_PRIMARY_TEXT_DIM }}>
                      closes {formatDeadline(challengeInfo.challenge.submissionDeadline)}
                    </div>
                  )}
                </div>
              )}
              <button
                onClick={() => setIsModalOpen(true)}
                disabled={!canSubmit}
                className={`w-full py-3 rounded text-sm font-medium uppercase tracking-wider transition-all ${
                  canSubmit
                    ? 'cursor-pointer'
                    : 'bg-white/[0.02] text-gray-600 border border-white/5 cursor-not-allowed opacity-60'
                }`}
                style={
                  canSubmit
                    ? {
                        backgroundColor: HACK_PRIMARY_BG,
                        color: HACK_PRIMARY_TEXT,
                        border: `1px solid ${HACK_PRIMARY_BORDER}`,
                      }
                    : undefined
                }
              >
                🚀 Submit
              </button>
            </div>
          </div>

          {/* Main Content */}
          <div className="relative flex-1 min-w-0 p-5">
            <button
              type="button"
              onClick={() => setAreControlsVisible((current) => !current)}
              className="absolute right-5 top-5 z-10 rounded-full border px-4 py-2 text-[11px] font-semibold uppercase tracking-[0.18em] transition-all"
              style={{
                borderColor: HACK_PRIMARY_BORDER,
                backgroundColor: HACK_PRIMARY_BG,
                color: HACK_PRIMARY_TEXT,
              }}
            >
              {areControlsVisible ? 'Hide Controls' : 'Show Controls'}
            </button>
            <div className="flex h-full items-center justify-center">
              <div className="flex max-w-full items-center gap-2">
                {areControlsVisible ? (
                  isTwoPlayer ? (
                    <VirtualGamepad
                      controllerIds={['p1']}
                      activeKeys={activeKeys}
                      onPressControl={pressVirtualControl}
                      onReleaseControl={releaseVirtualControl}
                    />
                  ) : (
                    <div className="w-[236px] shrink-0" aria-hidden="true"></div>
                  )
                ) : null}
                <div className="aspect-[4/3] w-[800px] max-w-full flex-[0_1_800px] rounded border-2 border-white/30 shadow-2xl shadow-white/10 overflow-hidden">
                  <iframe
                    id="game-frame"
                    width="800"
                    height="600"
                    sandbox="allow-scripts allow-same-origin"
                    className="h-full w-full"
                  ></iframe>
                </div>
                {areControlsVisible ? (
                  <VirtualGamepad
                    controllerIds={isTwoPlayer ? ['p2'] : ['p1']}
                    activeKeys={activeKeys}
                    onPressControl={pressVirtualControl}
                    onReleaseControl={releaseVirtualControl}
                  />
                ) : null}
              </div>
            </div>
          </div>

          <SubmissionModal
            isOpen={isModalOpen}
            onClose={() => setIsModalOpen(false)}
            checks={checks}
            gitInfo={gitInfo}
            coverCheck={coverCheck}
            challengeInfo={challengeInfo}
          />
        </div>
      );
    }

    // Load game in iframe
    async function loadGame() {
      const iframe = document.getElementById('game-frame');
      if (!iframe) {
        return;
      }

      iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin');

      try {
        const response = await fetch(getStarterUrl('/game.js'));
        if (!response.ok) throw new Error(`Failed to fetch game.js: ${response.status}`);
        const gameCode = await response.text();

        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
        iframeDoc.open();
        iframeDoc.write(`
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <style>
              html, body, #game-root { width: 100%; height: 100%; margin: 0; }
              body { overflow: hidden; background: #000; }
            </style>
            <script>
              const forwardedKeys = new Set(['w', 'a', 's', 'd', 'u', 'i', 'o', 'j', 'k', 'l', 'ArrowUp', 'ArrowLeft', 'ArrowRight', 'ArrowDown', 'r', 't', 'y', 'f', 'g', 'h', 'Enter', '1', '2', '3']);

              function postKeyState(event, pressed) {
                if (!forwardedKeys.has(event.key) || !window.parent || window.parent === window) {
                  return;
                }

                window.parent.postMessage({
                  type: '${IFRAME_KEY_STATE_MESSAGE}',
                  key: event.key,
                  pressed,
                }, '*');
              }

              window.addEventListener('keydown', (event) => postKeyState(event, true));
              window.addEventListener('keyup', (event) => postKeyState(event, false));

              window.initGame = function() {
                console.log('Phaser loaded, initializing game...');
                try {
                  ${gameCode}
                  console.log('Game initialized successfully');
                } catch (error) {
                  console.error('Game initialization error:', error);
                }
              };
            <\/script>
            <script src="https://cdn.jsdelivr.net/npm/phaser@3.87.0/dist/phaser.min.js" onload="initGame()"><\/script>
          </head>
          <body><div id="game-root"></div></body>
          </html>
        `);
        iframeDoc.close();
      } catch (error) {
        console.error('Failed to load game:', error);
      }
    }

    // Initialize
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
    
    // Load game when ready
    setTimeout(loadGame, 100);
  </script>
</body>
</html>
